[build]
  publish = "public"

[functions]
  node_bundler = "esbuild"

# Always revalidate the cross-sell script so a new deploy takes effect
# immediately. Without this, browsers and the Netlify CDN cache the static
# JS aggressively and keep serving a stale copy after each update.
# "max-age=0, must-revalidate" lets the browser keep the file but check the
# ETag on every load — it gets a fast 304 when unchanged, the new file when
# it changed. No version query string needed in the Webflow <script src>.
[[headers]]
  for = "/crossell-popup.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Same revalidate policy for the Omnisend tracking scripts so template/Webflow
# <script src> tags pick up new deploys immediately (fast 304 when unchanged).
[[headers]]
  for = "/omnisend-identify.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/omnisend-add-to-cart.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/omnisend-started-checkout.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Subscription-management script for the Webflow "Manage Subscriptions" page —
# same revalidate policy so Webflow picks up new deploys immediately.
[[headers]]
  for = "/manage-subscriptions.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Daily subscription stock check. Foxy bills all renewals ~7am store-local and does
# NOT check inventory first, so this runs before that batch, tallies each due
# subscription's needs, compares against Airtable, and posts shortfalls to Slack.
# "0 10 * * 1-5" = 10:00 UTC Mon–Fri = 5am CDT / 4am CST — safely before 7am Central
# year-round. The Friday run covers Sat/Sun/Mon renewals (stock isn't replenished
# over the weekend), so no weekend cron is needed.
[functions."subscription-stock-check"]
  schedule = "0 10 * * 1-5"

# Production — deploys from main branch
[context.production]
